<body>
    <div id="header"></div>

    <section class="vx-cart-page">

        <div class="vx-cart-container">

            <!-- LEFT: ITEMS -->

                        <div class="vx-card-bottom">
                            <div class="vx-qty">
                                <button>-</button>

                                <button>+</button>
                            </div>

                            <div class="vx-price">₹1,499</div>
                        </div>

                        <button class="vx-remove">Remove</button>
                    </div>
                </div>
                <div class="vx-cart-card">

                <!-- COPY MORE ITEMS -->

            <!-- RIGHT: SUMMARY -->

        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        // product card
        let product_cards = document.querySelectorAll(".prd-crd");
        product_cards.forEach((card) => {
            card.addEventListener("mouseenter", () => {
                let prdimg = card.querySelector(".prd-img img");
                prdimg.src = "web/image/ctgimg2.webp";
            });

            card.addEventListener("mouseleave", () => {
                let prdimg = card.querySelector(".prd-img img");
                prdimg.src = "web/image/ctgimg1.webp";
            });
        });
    </script>
