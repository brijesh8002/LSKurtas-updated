<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard | Laat Saheb</title>
  
  <link rel="stylesheet" href="web/css/style.css">
  <link rel="stylesheet" href="web/css/style2.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.css"
    integrity="sha512-yHknP1/AwR+yx26cB1y0cjvQUMvEa2PFzt1c9LlS4pRQ5NOTZFWbhBig+X9G9eYW/8m0/4OXNx8pxJ6z57x0dw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick-theme.min.css"
    integrity="sha512-17EgCFERpgZKcm0j0fEq1YCJuyAWdz9KUtv1EjVuaOz8pDnh/0nZxmU6BBXwaaxqoi9PQXnRWqlcDB027hgv9A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" href="web/image/logo-icon.png">
</head>

<body>
  <div id="header"></div>
  <main>
    <div class="container">


      <section class="checkout-page pb-5">
        <h2 class="checkout-title text-center pt-5 text-uppercase">
          Checkout
        </h2>

        <div class="checkout-container">
          <!-- LEFT SECTION -->

          <div class="checkout-left">
            <!-- SHIPPING INFORMATION -->

            <div class="checkout-card mb-3">
              <h3>Shipping Information</h3>

              <div class="form-grid">
                <input type="text" placeholder="Full Name" />
                <input type="text" placeholder="Phone Number" />

                <input type="email" placeholder="Email Address" />
                <input type="text" placeholder="Pincode" />

                <input type="text" placeholder="City" />
                <input type="text" placeholder="State" />

                <textarea placeholder="Full Address"></textarea>
              </div>
            </div>

            <div class="checkout-card mb-3">
              <h3>Payment Method</h3>

              <label class="payment-option">
                <input type="radio" name="payment" />
                <span>Cash on Delivery</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="payment" />
                <span>Credit / Debit Card</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="payment" />
                <span>UPI Payment</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="payment" />
                <span>Net Banking</span>
              </label>
            </div>

            
          </div>

          <!-- RIGHT SECTION -->

          <div class="checkout-right">


            <div class="summary-card mb-3">
              <h3>Apply Coupon</h3>

              <div class="coupon-box">
                <input type="text" id="couponInput" placeholder="Enter Coupon Code" />

                <button>Apply</button>
              </div>

              <p class="mb-0 mt-3">View Coupons and Gift Cards</p>
            </div>



            <!-- ORDER ITEMS -->

            <div class="checkout-card ">
              <h3>Your Items</h3>
              <hr>

              <div class="product-row">


                <div class="product-info">
                  <p class="fw-bold fs-small">WHITE ELEPHANT PATTERN JACQUARD DESIGNER KURTA</p>
                </div>

                <div class="product-price">₹1899</div>
              </div>
              <div class="product-row">


                <div class="product-info">
                  <p class="fw-bold fs-small">WHITE ELEPHANT PATTERN JACQUARD DESIGNER KURTA</p>
                </div>

                <div class="product-price">₹1899</div>
              </div>
             




            </div>

            <!-- PAYMENT METHOD -->



            <div class="summary-card card-2">
              <h3>Order Summary</h3>

              <div class="summary-line">
                <span>Items Total</span>
                <span>₹4098</span>
              </div>

              <div class="summary-line">
                <span>Shipping</span>
                <span>Free</span>
              </div>

              <div class="summary-line">
                <span>Discount</span>
                <span>- ₹0</span>
              </div>

              <hr />

              <div class="summary-line total">
                <span>Total</span>
                <span>₹4098</span>
              </div>

              <a href="dashboard.html" class="text-decoration-none text-white"><button class="place-order"> Place
                  Order</button></a>
            </div>
          </div>
        </div>
      </section>


    </div>
  </main>
  <div id="footerId"></div>

  <script src="web/js/main.js"></script>
  <script src="web/js/my_script.js"></script>
  <script src="web/js/toggle_sidebar.js"></script>
  <script src="web/js/new_script.js"></script>
  <script src="web/js/script.js"></script>
  <!-- bottom fixed nav end -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.js"
    integrity="sha512-HGOnQO9+SP1V92SrtZfjqxxtLmVzqZpjFFekvzZVWoiASSQgSr4cw9Kqd2+l8Llp4Gm0G8GIFJ4ddwZilcdb8A=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
