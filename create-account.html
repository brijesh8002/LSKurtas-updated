<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Laat Saheb</title>
    <link rel="stylesheet" href="web/css/style.css" />
    <link rel="stylesheet" href="web/css/style2.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.css"
      integrity="sha512-yHknP1/AwR+yx26cB1y0cjvQUMvEa2PFzt1c9LlS4pRQ5NOTZFWbhBig+X9G9eYW/8m0/4OXNx8pxJ6z57x0dw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick-theme.min.css"
      integrity="sha512-17EgCFERpgZKcm0j0fEq1YCJuyAWdz9KUtv1EjVuaOz8pDnh/0nZxmU6BBXwaaxqoi9PQXnRWqlcDB027hgv9A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="web/image/logo-icon.png" />
  </head>

  <body>
    <div id="header"></div>

    <!-- Wish List start -->

    <section class="vx-contact-section">
      <div class="mainsection-heading">
        <h1><i class="bi bi-person-rolodex"></i> Create Account</h1>
      </div>

      <!-- FORM -->
      <div
        class="vx-contact-form d-flex align-item-center justify-content-center w-100"
      >
        <form>
          <!-- ROW -->
          <div class="vx-row ">
            <!-- First Name -->
            <div class="vx-input-box">
              <label>First Name</label>
              <input type="text" placeholder="Enter First Name" required/>
            </div>
            <!-- Last Name -->
            <div class="vx-input-box">
              <label>Last Name</label>
              <input type="text" placeholder="Enter Last Name" required  />
            </div>
          </div>
          <div class="vx-row vx-row2">
            <!-- Email -->
            <div class="vx-input-box">
              <label>EMAIL</label>
              <input type="email" placeholder="Your email"   required />
            </div>
            <div class="vx-input-box">
              <label>NUMBER</label>
              <input type="text" placeholder="Optional" />
            </div>
            <!-- Password -->
            <div class="vx-input-box position-relative">
              <label>Password</label>
              <input
                type="password"
                class="pe-5"
                placeholder="Enter Password"
                id="password"
              />
              <div class="eye-icon-pass position-absolute">
                <i
                  id="toggleIcon"
                  class="bi bi-eye-slash"
                  onclick="togglePassword()"
                ></i>
              </div>
            </div>
          </div>

          <!-- BUTTON -->
          <button type="submit" class="vx-btn mt-0">Register</button>
          <!-- <a href="#" class="mt-3 fs-5  text-black" style="cursor: pointer;">Create Account</a> -->
          <div class="vx-row vx-row2">
            <div class="vx-input-box mt-3">
              <label
                >Already have an account? :
                <a href="login.html">Login</a></label
              >
            </div>
          </div>

          <!-- FOOTER TEXT -->
          <p class="vx-note">
            This site is protected by hCaptcha and the hCaptcha Privacy Policy
            and Terms of Service apply.
          </p>
        </form>
      </div>
    </section>

    <!-- Wish List end -->

    <div id="footerId"></div>

    <script src="web/js/main.js"></script>
    <script src="web/js/my_script.js"></script>
    <script src="web/js/toggle_sidebar.js"></script>
    <script src="web/js/new_script.js"></script>
    <script src="web/js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.js"
      integrity="sha512-HGOnQO9+SP1V92SrtZfjqxxtLmVzqZpjFFekvzZVWoiASSQgSr4cw9Kqd2+l8Llp4Gm0G8GIFJ4ddwZilcdb8A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    
  </body>
</html>
