  <body>
    <div id="header"></div>

    <!-- Wish List start -->

    <section class="vx-contact-section">
      <div class="mainsection-heading">
        <h1><i class="bi bi-person-lines-fill"></i> Login</h1>
      </div>

      <!-- FORM -->
      <div class="vx-contact-form d-flex align-item-center justify-content-center w-100">
        <form>
          <!-- ROW -->
          <div class="vx-row vx-row2">
            <div class="vx-input-box">
              <label>EMAIL</label>
              <input type="email" placeholder="Your email" />
            </div>
            <!-- Password -->
            <div class="vx-input-box position-relative">
              <label>Password</label>
              <input type="password" class="pe-5" placeholder="Enter Password" id="password" />
              <div class="eye-icon-pass position-absolute"><i id="toggleIcon" class="bi bi-eye-slash" onclick="togglePassword()"></i></div>
            </div>
            <div class="vx-input-box position-relative">
              <label><a href="forgot-pass.html" class="text-secondary">Forgot Password?</a></label>
            </div>
          </div>

          <!-- BUTTON -->
          <a href="dashboard.html"  class="vx-btn mt-0 ">login</a>
          <!-- <a href="#" class="mt-3 fs-5  text-black" style="cursor: pointer;">Create Account</a> -->
           <div class="vx-row vx-row2">
            
            <div class="vx-input-box mt-3">
              <label>Don't have an account? : <a href="create-account.html" >Create Account</a></label>
            </div>
          </div>


          <!-- FOOTER TEXT -->
          <p class="vx-note">
            This site is protected by hCaptcha and the hCaptcha Privacy Policy
            and Terms of Service apply.
          </p>
        </form>
      </div>
    </section>

    <!-- Wish List end -->
