<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="web/css/style2.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.css"
      integrity="sha512-yHknP1/AwR+yx26cB1y0cjvQUMvEa2PFzt1c9LlS4pRQ5NOTZFWbhBig+X9G9eYW/8m0/4OXNx8pxJ6z57x0dw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick-theme.min.css"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="web/image/logo-icon.png" />
  </head>

  <body>
    <div id="header"></div>

    <!-- Wish List start -->

    <section class="vx-contact-section">
      <div class="mainsection-heading">
        <h1><i class="bi bi-person-lines-fill"></i> Login</h1>
      </div>

      <div class="vx-contact-top">
        <h3 class=".text-body-tertiary fs-3">Reset your password</h3>
        <p class="text-secondary fs-6">We will send you an OTP to your email to reset your password.</p>
      </div>

      <!-- FORM -->
      <div
        class="vx-contact-form d-flex align-item-center justify-content-center w-100"
      >
        <form>
          <!-- ROW -->
          <div class="vx-row vx-row2">
            <div class="vx-input-box">
              <label>EMAIL</label>
              <input type="email" placeholder="Your email" />
            </div>
            <!-- Password -->
            <div class="vx-input-box ">
              <label>OTP</label>
              <input
                type="TEXT"
                class="pe-5"
                placeholder="Enter OTP"
                
              />
              
            </div>
            
          </div>

          <!-- BUTTON -->
          <button type="submit" class="vx-btn mt-0">Submit</button>
          <button type="submit" class="vx-btn mt-2 bg-transparent text-black border border-dark">Cancel</button>
          <div class="vx-row vx-row2">
            
            <div class="vx-input-box mt-3">
              <label>Don't have an account? : <a href="create-account.html" >Create Account</a></label>
            </div>
          </div>

          <!-- FOOTER TEXT -->
          <p class="vx-note">
            This site is protected by hCaptcha and the hCaptcha Privacy Policy
            and Terms of Service apply.
          </p>
        </form>
      </div>
    </section>

    <!-- Wish List end -->

    <div id="footerId"></div>

    <script src="web/js/main.js"></script>
    <script src="web/js/my_script.js"></script>
    <script src="web/js/toggle_sidebar.js"></script>
    <script src="web/js/new_script.js"></script>
    <script src="web/js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.js"
      integrity="sha512-HGOnQO9+SP1V92SrtZfjqxxtLmVzqZpjFFekvzZVWoiASSQgSr4cw9Kqd2+l8Llp4Gm0G8GIFJ4ddwZilcdb8A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    
  </body>
